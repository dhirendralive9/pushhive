version: '3.8'

services:
  # ── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pushhive-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - pushhive-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PushHive App ────────────────────────────────────────────────
  app:
    build: .
    container_name: pushhive-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/pushhive
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - pushhive-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  mongo_data:
    driver: local

networks:
  pushhive-net:
    driver: bridge
